name: Deploy server
run-name: Deploy server

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}"
          file: "server/docker/Dockerfile"
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    container: ghcr.io/medvesek/infrastructure-ansible:latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: medvesek/infrastructure/github-actions/lkwdeploy@master
        with:
          cloudflare-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          server-ip: ${{ secrets.AQUILA_IP }}
          ssh-user: ${{ secrets.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_KEY_PRIVATE_GITHUB_ACTIONS }}
          config: lkw-server.yaml
